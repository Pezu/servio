# Local development profile
# Start with: mvn spring-boot:run -Dspring-boot.run.profiles=local

spring:
  kafka:
    bootstrap-servers: localhost:9092
  datasource:
    url: jdbc:postgresql://localhost:5433/orderdb
    username: orderuser
    password: orderpass
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Event API service URL
services:
  event-api:
    url: http://localhost:8081

