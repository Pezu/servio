spring:
  application:
    name: order-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/servio?currentSchema=orders}
    username: ${DATABASE_USERNAME:servio}
    password: ${DATABASE_PASSWORD:serviopass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: orders

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: orders

  # AWS SQS configuration
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:local}
        secret-key: ${AWS_SECRET_ACCESS_KEY:local}
      region:
        static: ${AWS_REGION:us-east-1}
      sqs:
        endpoint: ${SQS_ENDPOINT:http://localhost:9324}

server:
  port: ${SERVER_PORT:8082}
  address: 0.0.0.0

# SQS Queue names
sqs:
  queues:
    # Queues this service publishes to
    order-created: order-created
    order-status-changed: order-status-changed
    order-item-status-changed: order-item-status-changed
    payment-completed: payment-completed
    # Queues this service consumes from
    registration-validated: registration-validated

# External services
services:
  event-api:
    url: ${EVENT_API_URL:http://localhost:8080}

# Netopia payment gateway
netopia:
  api-key: ${NETOPIA_API_KEY}
  pos-signature: ${NETOPIA_POS_SIGNATURE}
  base-url: ${NETOPIA_BASE_URL:https://secure.sandbox.netopia-payments.com}
  notify-url: ${NETOPIA_NOTIFY_URL:http://localhost:8081/api/payments/netopia/notify}
  redirect-url: ${NETOPIA_REDIRECT_URL:http://localhost:4200/payment/confirmed}
  language: ${NETOPIA_LANGUAGE:ro}
  currency: ${NETOPIA_CURRENCY:RON}
  email-template: ${NETOPIA_EMAIL_TEMPLATE:confirm}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.servio.order: DEBUG
    io.awspring.cloud.sqs: DEBUG
