spring:
  application:
    name: order-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/orderdb}
    username: ${DATABASE_USERNAME:orderuser}
    password: ${DATABASE_PASSWORD:orderpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        linger.ms: 10
        batch.size: 32768
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      group-id: order-service
      properties:
        spring.json.trusted.packages: com.servio.order.event,com.servio.event.event

server:
  port: ${SERVER_PORT:8082}
  address: 0.0.0.0

# Kafka topics
kafka:
  topics:
    # Events this service publishes
    order-created: order.created
    order-status-changed: order.status.changed
    order-item-status-changed: order.item.status.changed
    payment-required: payment.required
    payment-completed: payment.completed
    # Events this service consumes
    registration-validated: registration.validated
    event-order-number: event.order.number

# External services
services:
  event-api:
    url: ${EVENT_API_URL:http://localhost:8080}

# Netopia payment gateway
netopia:
  api-key: ${NETOPIA_API_KEY}
  pos-signature: ${NETOPIA_POS_SIGNATURE}
  base-url: ${NETOPIA_BASE_URL:https://secure.sandbox.netopia-payments.com}
  notify-url: ${NETOPIA_NOTIFY_URL:http://localhost:8081/api/payments/netopia/notify}
  redirect-url: ${NETOPIA_REDIRECT_URL:http://localhost:4200/payment/confirmed}
  language: ${NETOPIA_LANGUAGE:ro}
  currency: ${NETOPIA_CURRENCY:RON}
  email-template: ${NETOPIA_EMAIL_TEMPLATE:confirm}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.servio.order: DEBUG
    org.springframework.kafka: INFO
