spring:
  application:
    name: api-gateway

  # Redis for WebSocket state
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # AWS SQS for consuming events (WebSocket notifications)
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:local}
        secret-key: ${AWS_SECRET_ACCESS_KEY:local}
      region:
        static: ${AWS_REGION:us-east-1}
      sqs:
        endpoint: ${SQS_ENDPOINT:http://localhost:9324}

server:
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0
  tomcat:
    connection-timeout: 60000
    max-swallow-size: -1

spring.servlet.multipart:
  enabled: false

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Backend services
services:
  event-api:
    url: ${EVENT_API_URL:http://localhost:8081}
  order-service:
    url: ${ORDER_SERVICE_URL:http://localhost:8082}

# JWT configuration
jwt:
  secret: ${JWT_SECRET:your-development-secret-key-at-least-32-chars}

# SQS Queue names for WebSocket notifications
sqs:
  queues:
    order-created: order-created
    order-status-changed: order-status-changed
    order-item-status-changed: order-item-status-changed
    payment-completed: payment-completed
    registration-validated: registration-validated
    validation-requested: validation-requested

# CORS for WebSocket endpoints
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

logging:
  level:
    com.servio.gateway: DEBUG
    io.awspring.cloud.sqs: DEBUG
