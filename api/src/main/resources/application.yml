spring:
  application:
    name: event
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/servio?currentSchema=event}
    username: ${DATABASE_USERNAME:servio}
    password: ${DATABASE_PASSWORD:serviopass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: event
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: event
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

server:
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0
  tomcat:
    connection-timeout: 60000
    max-swallow-size: -1

spring.servlet.multipart:
  enabled: true
  max-file-size: 10MB
  max-request-size: 10MB

# Actuator endpoints
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

application:
  base-url: ${APPLICATION_BASE_URL:http://localhost:4200}

# JWT configuration - use profiles (local/prod) or set JWT_SECRET env var
jwt:
  secret: ${JWT_SECRET:}

# CORS configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

elasticsearch:
  host: ${ELASTICSEARCH_HOST:localhost}

aws:
  s3:
    endpoint: ${AWS_S3_ENDPOINT:http://localhost:9000}
    access-key: ${AWS_ACCESS_KEY_ID:minioadmin}
    secret-key: ${AWS_SECRET_ACCESS_KEY:minioadmin}
    bucket: ${AWS_S3_BUCKET:images}
    region: ${AWS_REGION:us-east-1}

netopia:
  api-key: ${NETOPIA_API_KEY:GMaWOObfdYQBlUWcuZFVnEqw-5DOTm6s7iOz5FFbdh0TYH23CJPEeKFx284g}
  pos-signature: ${NETOPIA_POS_SIGNATURE:37ZT-B3X1-VZOC-GOIK-2RXP}
  base-url: ${NETOPIA_BASE_URL:https://secure.sandbox.netopia-payments.com}
  notify-url: ${NETOPIA_NOTIFY_URL:http://localhost:8080/api/payments/netopia/callback}
  redirect-url: ${NETOPIA_REDIRECT_URL:http://localhost:4200/payment/confirmed}
  language: ${NETOPIA_LANGUAGE:ro}
  currency: ${NETOPIA_CURRENCY:RON}
  email-template: ${NETOPIA_EMAIL_TEMPLATE:confirm}
