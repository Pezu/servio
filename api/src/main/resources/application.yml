spring:
  application:
    name: event
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/servio?currentSchema=event}
    username: ${DATABASE_USERNAME:servio}
    password: ${DATABASE_PASSWORD:serviopass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: event
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: event
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

server:
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0
  tomcat:
    connection-timeout: 60000
    max-swallow-size: -1

spring.servlet.multipart:
  enabled: true
  max-file-size: 10MB
  max-request-size: 10MB

# Actuator endpoints
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

application:
  base-url: ${APPLICATION_BASE_URL:http://localhost:4200}

# JWT configuration - use profiles (local/prod) or set JWT_SECRET env var
jwt:
  secret: ${JWT_SECRET:}
  # Token time-to-live in milliseconds (default 24h). Override via JWT_EXPIRATION_MS.
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# CORS configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

aws:
  s3:
    endpoint: ${AWS_S3_ENDPOINT:https://storage.googleapis.com}
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
    bucket: ${AWS_S3_BUCKET:servio-order-app-uploads}
    region: ${AWS_REGION:us-east-1}

netopia:
  api-key: ${NETOPIA_API_KEY:GMaWOObfdYQBlUWcuZFVnEqw-5DOTm6s7iOz5FFbdh0TYH23CJPEeKFx284g}
  pos-signature: ${NETOPIA_POS_SIGNATURE:37ZT-B3X1-VZOC-GOIK-2RXP}
  base-url: ${NETOPIA_BASE_URL:https://secure.sandbox.netopia-payments.com}
  notify-url: ${NETOPIA_NOTIFY_URL:http://localhost:8080/api/payments/netopia/callback}
  redirect-url: ${NETOPIA_REDIRECT_URL:http://localhost:4200/payment/confirmed}
  language: ${NETOPIA_LANGUAGE:ro}
  currency: ${NETOPIA_CURRENCY:RON}
  email-template: ${NETOPIA_EMAIL_TEMPLATE:confirm}

# Firebase Admin (FCM push notifications)
# Provide ONE of these. credentials-json takes precedence; if both are empty,
# the SDK falls back to application-default credentials (works on GCP runtimes).
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  credentials-json: ${FIREBASE_CREDENTIALS_JSON:}

# Single ECR bridge that fans out to all physical printers.
# The bridge connects with X-Bridge-Key and the API publishes every print job to
# /user/{bridge-principal}/queue/ecr/print — the bridge picks the printer by IP.
bridge:
  # Default is the shared dev/bridge key (matches the cash app's default) so the
  # local bridge connects with no extra env. Prod overrides via BRIDGE_API_KEY.
  api-key: ${BRIDGE_API_KEY:GOj3gcAgBiOnJQ2lAEzNeaLJqDg03ZdeD7LyiTt5J3uCl1xi}
  principal: bridge
