services:
  # ===========================================
  # DATABASE
  # ===========================================

  postgres:
    image: postgres:16-alpine
    container_name: servio-postgres
    environment:
      POSTGRES_DB: servio
      POSTGRES_USER: servio
      POSTGRES_PASSWORD: serviopass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    networks:
      - servio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servio -d servio"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # NGROK (for Netopia callbacks in local dev)
  # ===========================================

  ngrok:
    image: ngrok/ngrok:latest
    container_name: servio-ngrok
    restart: unless-stopped
    command:
      - "http"
      - "host.docker.internal:8080"
      - "--log=stdout"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    networks:
      - servio-network

volumes:
  postgres-data:

networks:
  servio-network:
    driver: bridge
