services:
  # ===========================================
  # DATABASE
  # ===========================================

  postgres:
    image: postgres:16-alpine
    container_name: servio-postgres
    environment:
      POSTGRES_DB: servio
      POSTGRES_USER: servio
      POSTGRES_PASSWORD: serviopass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    networks:
      - servio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servio -d servio"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # EVENT API (Unified Backend)
  # ===========================================

  event-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: servio-event-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/servio?currentSchema=event
      DATABASE_USERNAME: servio
      DATABASE_PASSWORD: serviopass
      AWS_S3_ENDPOINT: https://storage.googleapis.com
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-servio-order-app-uploads}
      AWS_REGION: us-east-1
      JWT_SECRET: your-development-secret-key-at-least-32-chars
      APPLICATION_BASE_URL: http://localhost:4200
      CORS_ALLOWED_ORIGINS: http://localhost:4200
    ports:
      - "8080:8080"
    networks:
      - servio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================
  # FRONTEND
  # ===========================================

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: servio-frontend
    depends_on:
      event-api:
        condition: service_healthy
    ports:
      - "4200:80"
    networks:
      - servio-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  servio-network:
    driver: bridge
